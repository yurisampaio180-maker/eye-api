# EYE Agência — orquestração local/produção
# Sobe a API com um volume persistente para banco (SQLite) + uploads.
#
#   docker compose up -d --build
#
# Defina os segredos num arquivo .env ao lado (NÃO versionar):
#   JWT_ACCESS_SECRET=...   JWT_REFRESH_SECRET=...   CORS_ORIGIN=https://seu-front
services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      PORT: 3333
      DATABASE_URL: file:./data/eye.db
      UPLOAD_DIR: ./data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5190}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?defina JWT_ACCESS_SECRET no .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina JWT_REFRESH_SECRET no .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      SEED_DEFAULT_PASSWORD: ${SEED_DEFAULT_PASSWORD:-eye123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - eye-data:/app/data

volumes:
  eye-data:

